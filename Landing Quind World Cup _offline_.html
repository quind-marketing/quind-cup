  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

age: url(\"156394e0-9dcf-4f93-901e-8d0da06f88c8\");\n    background-size: cover;\n    background-position: center 50%;\n    background-repeat: no-repeat;\n    opacity: 1;\n    animation: bgFloat 22s ease-in-out infinite alternate;\n  }\n\n  .bg-vignette{\n    position: absolute;\n    inset: 0;\n    z-index: -1;\n    background:\n      radial-gradient(ellipse 110% 80% at 50% 50%, transparent 0%, transparent 50%, rgba(3,18,18,0.55) 100%),\n      linear-gradient(180deg, rgba(3,18,18,0.25) 0%, rgba(3,18,18,0) 18%, rgba(3,18,18,0) 78%, rgba(3,18,18,0.55) 100%);\n  }\n\n  @keyframes bgFloat {\n    0%   { transform: scale(1.02) translate(0,0); }\n    100% { transform: scale(1.06) translate(0,-1.5%); }\n  }\n\n  /* Particulas decorativas */\n  .spark{\n    position: absolute;\n    width: 4px; height: 4px;\n    background: var(--yellow);\n    border-radius: 50%;\n    opacity: 0;\n    filter: blur(0.5px);\n    box-shadow: 0 0 12px var(--yellow);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .spark.s1 { top:12%; left:8%;  animation: spark 6s var(--ease) infinite; animation-delay: .2s;}\n  .spark.s2 { top:22%; right:12%; animation: spark 7s var(--ease) infinite; animation-delay: 1.4s;}\n  .spark.s3 { bottom:28%; left:14%; animation: spark 8s var(--ease) infinite; animation-delay: 2.6s;}\n  .spark.s4 { bottom:18%; right:10%; animation: spark 6.5s var(--ease) infinite; animation-delay: 3.2s;}\n  .spark.s5 { top:55%; left:6%; animation: spark 7.5s var(--ease) infinite; animation-delay: 4.1s;}\n  .spark.s6 { top:40%; right:6%; animation: spark 9s var(--ease) infinite; animation-delay: 1s;}\n\n  @keyframes spark {\n    0%   { opacity: 0; transform: translateY(0) scale(.6); }\n    30%  { opacity: .9; transform: translateY(-14px) scale(1); }\n    70%  { opacity: .6; transform: translateY(-28px) scale(1.1); }\n    100% { opacity: 0; transform: translateY(-48px) scale(.5); }\n  }\n\n  /* ============ CONTENEDOR ============ */\n  .wrap{\n    position: relative;\n    max-width: 880px;\n    margin: 0 auto;\n    padding: clamp(12px, 2vw, 24px) clamp(20px, 5vw, 48px) clamp(28px, 4vw, 48px);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: flex-start;\n    min-height: 100vh;\n    min-height: 100svh;\n    z-index: 2;\n    gap: 0;\n  }\n\n  /* ============ BRAND / LOGO ============\n     Solo el logo completo (Quind + WORLD CUP) flotando, sin tarjeta.\n  */\n  .brand{\n    position: relative;\n    width: 325px;\n    max-width: 90vw;\n    aspect-ratio: 556 / 217;\n    margin-top: 0;\n    margin-bottom: clamp(20px, 3.5vw, 36px);\n    opacity: 0;\n    animation: brandIn .8s var(--ease) .1s forwards;\n  }\n\n  .brand__logo{\n    position: relative;\n    z-index: 2;\n    width: 100%;\n    height: 100%;\n    object-fit: contain;\n    object-position: center;\n    user-select: none;\n    -webkit-user-drag: none;\n    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.45));\n    animation: logoFloat 4.5s ease-in-out 1.2s infinite alternate;\n    will-change: transform;\n  }\n\n  .brand:hover .brand__logo{\n    animation-play-state: paused;\n    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.55));\n  }\n\n  @keyframes brandIn {\n    0%   { opacity: 0; transform: translateY(-24px) scale(.94); }\n    100% { opacity: 1; transform: translateY(0) scale(1); }\n  }\n  @keyframes logoFloat {\n    0%   { transform: translateY(0)   rotate(-0.8deg); }\n    100% { transform: translateY(-8px) rotate(0.8deg); }\n  }\n\n  /* ============ TITULO ============ */\n  .headline{\n    font-weight: 800;\n    color: var(--yellow);\n    font-size: clamp(38px, 7.5vw, 76px);\n    line-height: 0.95;\n    letter-spacing: -0.015em;\n    text-align: center;\n    margin: 0 0 clamp(22px, 3.5vw, 40px);\n    position: relative;\n    text-shadow: 0 4px 24px rgba(0,0,0,0.35);\n  }\n  .headline .line{\n    display: block;\n    overflow: hidden;\n  }\n  .headline .line span{\n    display: inline-block;\n    transform: translateY(110%);\n    color: var(--yellow);\n    filter: drop-shadow(0 4px 14px rgba(245,184,25,0.3));\n  }\n  .headline .line:nth-child(1) span{\n    animation: slideUp .9s var(--ease) .35s forwards;\n  }\n  .headline .line:nth-child(2) span{\n    animation: slideUp .9s var(--ease) .55s forwards;\n  }\n\n  @keyframes slideUp { to { transform: translateY(0); } }\n\n  /* ============ INFO (sin cards, con divisores) ============ */\n  .info{\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    width: 100%;\n    max-width: 780px;\n    margin: 0 auto clamp(22px, 3.5vw, 40px);\n    position: relative;\n  }\n\n  .info__col{\n    position: relative;\n    text-align: center;\n    padding: 8px clamp(10px, 2vw, 22px);\n    opacity: 0;\n    transform: translateY(18px);\n    transition: transform .4s var(--ease);\n  }\n  .info__col:nth-child(1){\n    animation: fadeUp .8s var(--ease) .85s forwards,\n               colFloat 6s ease-in-out 2s infinite alternate;\n  }\n  .info__col:nth-child(2){\n    animation: fadeUp .8s var(--ease) 1.0s forwards,\n               colFloat 6.4s ease-in-out 2.4s infinite alternate;\n  }\n  .info__col:nth-child(3){\n    animation: fadeUp .8s var(--ease) 1.15s forwards,\n               colFloat 5.8s ease-in-out 2.8s infinite alternate;\n  }\n\n  @keyframes colFloat {\n    0%   { transform: translateY(0); }\n    100% { transform: translateY(-4px); }\n  }\n\n  .info__col + .info__col::before{\n    content: '';\n    position: absolute;\n    left: 0; top: 12%;\n    height: 76%;\n    width: 1px;\n    background: linear-gradient(\n      to bottom,\n      transparent 0%,\n      var(--divider) 20%,\n      var(--divider) 80%,\n      transparent 100%\n    );\n  }\n\n  .info__icon{\n    width: 46px;\n    height: 46px;\n    margin: 0 auto 14px;\n    display: grid;\n    place-items: center;\n    position: relative;\n    transition: transform .4s var(--ease);\n  }\n  /* Anillo pulsante detrás del icono */\n  .info__icon::before{\n    content: '';\n    position: absolute;\n    inset: -6px;\n    border-radius: 50%;\n    border: 1.5px solid rgba(245,184,25,0.55);\n    opacity: 0;\n    animation: iconRing 2.4s ease-out infinite;\n  }\n  .info__col:nth-child(1) .info__icon::before{ animation-delay: 0s; }\n  .info__col:nth-child(2) .info__icon::before{ animation-delay: .8s; }\n  .info__col:nth-child(3) .info__icon::before{ animation-delay: 1.6s; }\n\n  @keyframes iconRing {\n    0%   { transform: scale(.6); opacity: 0; }\n    30%  { opacity: .9; }\n    100% { transform: scale(1.9); opacity: 0; }\n  }\n\n  .info__col:hover .info__icon{\n    transform: translateY(-4px) scale(1.12) rotate(-4deg);\n  }\n  .info__icon svg{\n    width: 100%; height: 100%;\n    color: var(--yellow);\n    filter: drop-shadow(0 2px 10px rgba(245,184,25,0.4));\n  }\n  /* icono reloj: manecilla gira */\n  .info__col:nth-child(3) .info__icon svg path:last-child{\n    transform-origin: 12px 12px;\n    animation: clockTick 6s linear infinite;\n  }\n  @keyframes clockTick {\n    0%   { transform: rotate(0deg); }\n    100% { transform: rotate(360deg); }\n  }\n\n  .info__label{\n    font-weight: 700;\n    color: var(--yellow);\n    font-size: clamp(16px, 2.2vw, 20px);\n    margin: 0 0 8px;\n    letter-spacing: 0.01em;\n  }\n  .info__value{\n    font-weight: 400;\n    font-size: clamp(14px, 1.9vw, 17px);\n    line-height: 1.4;\n    color: var(--white);\n  }\n  .info__value strong{\n    font-weight: 700;\n    color: #FFF4D6;\n  }\n\n  /* ============ TAGLINE ============ */\n  .tagline{\n    font-weight: 700;\n    text-align: center;\n    font-size: clamp(18px, 3vw, 30px);\n    line-height: 1.25;\n    letter-spacing: 0.01em;\n    margin: 0 0 clamp(20px, 3vw, 32px);\n    text-transform: uppercase;\n    position: relative;\n  }\n\n  /* Cada palabra/línea entra escalonada */\n  .tagline .w{\n    display: inline-block;\n    opacity: 0;\n    transform: translateY(14px);\n    animation: fadeUp .7s var(--ease) forwards;\n  }\n  .tagline .line-a .w:nth-child(1){ animation-delay: 1.35s; }\n  .tagline .line-a .w:nth-child(2){ animation-delay: 1.45s; }\n  .tagline .line-a .w:nth-child(3){ animation-delay: 1.55s; }\n\n  .tagline .line-a{ display: block; }\n  .tagline .line-b{\n    display: block;\n    color: var(--yellow);\n    position: relative;\n    opacity: 0;\n    transform: translateY(14px);\n    animation: fadeUp .8s var(--ease) 1.8s forwards;\n  }\n\n  /* ============ CTA ============ */\n  .cta{\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    gap: 14px;\n    background: var(--white);\n    color: #0a3737;\n    font-family: inherit;\n    font-weight: 700;\n    font-size: clamp(18px, 2.6vw, 24px);\n    padding: 18px 42px;\n    border: none;\n    border-radius: 14px;\n    cursor: pointer;\n    text-decoration: none;\n    box-shadow:\n      0 10px 24px rgba(0,0,0,0.35),\n      0 2px 0 rgba(0,0,0,0.08);\n    transition: transform .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);\n    opacity: 0;\n    transform: translateY(14px) scale(.96);\n    animation: fadeUpCta .8s var(--ease) 1.6s forwards, ctaPulse 2.8s ease-in-out 2.6s infinite;\n    overflow: hidden;\n  }\n  .cta::before{\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(245,184,25,0.35) 50%,\n      transparent 100%);\n    transform: translateX(-120%);\n    transition: transform .8s var(--ease);\n    pointer-events: none;\n  }\n  .cta:hover::before{ transform: translateX(120%); }\n  .cta:hover{\n    transform: translateY(-3px);\n    background: var(--yellow-soft);\n    box-shadow:\n      0 16px 34px rgba(245,184,25,0.35),\n      0 2px 0 rgba(0,0,0,0.08);\n  }\n  .cta:active{ transform: translateY(-1px) scale(.99); }\n\n  .cta__arrow{\n    width: 22px; height: 22px;\n    transition: transform .3s var(--ease);\n  }\n  .cta:hover .cta__arrow{ transform: translateX(6px); }\n\n  @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }\n  @keyframes fadeUp   { to { opacity: 1; transform: translateY(0); } }\n  @keyframes fadeUpCta { to { opacity: 1; transform: translateY(0) scale(1); } }\n  @keyframes ctaPulse {\n    0%, 100% { box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 0 0 0 rgba(245,184,25,0.45); }\n    50%      { box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 0 0 14px rgba(245,184,25,0); }\n  }\n\n  /* ============ FOOTER MICRO ============ */\n  .foot{\n    margin-top: clamp(16px, 2.5vw, 28px);\n    font-size: 11px;\n    color: var(--ink-mute);\n    text-align: center;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    opacity: 0;\n    animation: fadeUp .8s var(--ease) 2s forwards;\n  }\n\n  /* ============ RESPONSIVE ============ */\n  @media (max-width: 640px){\n    .wrap{\n      padding: clamp(16px, 4vw, 24px) 18px clamp(20px, 4vw, 32px);\n      justify-content: flex-start;\n      gap: 0;\n    }\n\n    /* Logo más compacto */\n    .brand{\n      width: 240px;\n      max-width: 75vw;\n      margin-bottom: 18px;\n    }\n\n    /* Título más pequeño y compacto */\n    .headline{\n      font-size: clamp(44px, 12vw, 60px) !important;\n      margin: 0 0 22px;\n    }\n\n    /* Info en 3 columnas compactas (como desktop) */\n    .info{\n      grid-template-columns: repeat(3, 1fr);\n      max-width: 100%;\n      gap: 0;\n      margin: 0 auto 22px;\n    }\n    .info__col{\n      padding: 8px 6px;\n    }\n    .info__col + .info__col::before{\n      /* mantener divisor vertical */\n      left: 0; right: auto;\n      top: 12%;\n      height: 76%;\n      width: 1px;\n      background: linear-gradient(\n        to bottom,\n        transparent 0%,\n        var(--divider) 20%,\n        var(--divider) 80%,\n        transparent 100%\n      );\n    }\n    .info__icon{\n      width: 36px;\n      height: 36px;\n      margin-bottom: 10px;\n    }\n    .info__label{\n      font-size: 14px;\n      margin-bottom: 4px;\n    }\n    .info__value{\n      font-size: 12px;\n      line-height: 1.35;\n    }\n\n    /* Tagline más compacto para que no rompa en muchas líneas */\n    .tagline{\n      font-size: 26px !important;\n      margin-bottom: 22px;\n    }\n\n    /* CTA en una sola línea */\n    .cta{\n      font-size: 20px !important;\n      padding: 16px 26px;\n      width: 100%;\n      max-width: 340px;\n      justify-content: center;\n      gap: 10px;\n      white-space: nowrap;\n    }\n    .cta__arrow{ width: 18px; height: 18px; }\n  }\n\n  /* Móviles muy angostos */\n  @media (max-width: 380px){\n    .headline{ font-size: 44px !important; }\n    .tagline{ font-size: 22px !important; }\n    .info__label{ font-size: 13px; }\n    .info__value{ font-size: 11px; }\n  }\n\n  @media (prefers-reduced-motion: reduce){\n    *, *::before, *::after{\n      animation-duration: .01ms !important;\n      animation-iteration-count: 1 !important;\n      transition-duration: .01ms !important;\n    }\n    .headline .line span { transform: none; }\n    .brand, .info__col, .tagline, .cta, .foot { opacity: 1; transform: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <main class=\"stage\">\n    <div class=\"bg-layer\"><\u002Fdiv>\n    <div class=\"bg-image\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"bg-vignette\"><\u002Fdiv>\n\n    <!-- chispas decorativas -->\n    <span class=\"spark s1\"><\u002Fspan>\n    <span class=\"spark s2\"><\u002Fspan>\n    <span class=\"spark s3\"><\u002Fspan>\n    <span class=\"spark s4\"><\u002Fspan>\n    <span class=\"spark s5\"><\u002Fspan>\n    <span class=\"spark s6\"><\u002Fspan>\n\n    <section class=\"wrap\">\n      <!-- LOGO: solo el logo con animación, sin tarjeta -->\n      <div class=\"brand\" aria-label=\"Quind World Cup\">\n        <img class=\"brand__logo\" src=\"27586746-7d85-41f2-ab44-cc4cf1e171dd\" alt=\"Quind World Cup\">\n      <\u002Fdiv>\n\n      <!-- TITULO -->\n      <h1 class=\"headline\">\n        <span class=\"line\"><span style=\"color: rgb(255, 255, 255)\">RECLAMA<\u002Fspan><\u002Fspan>\n        <span class=\"line\"><span>TU LUGAR<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n\n      <!-- INFO -->\n      <div class=\"info\">\n        <div class=\"info__col\">\n          <div class=\"info__icon\" aria-hidden=\"true\">\n            <!-- pin -->\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M12 22s-7-7.58-7-13a7 7 0 1 1 14 0c0 5.42-7 13-7 13z\"><\u002Fpath>\n              <circle cx=\"12\" cy=\"9\" r=\"2.5\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <p class=\"info__label\">Lugar:<\u002Fp>\n          <p class=\"info__value\">\n            Canchas<br>\n            Modo fútbol<br>\n            <strong>Cr 48 N° 61 sur 231<\u002Fstrong>\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"info__col\">\n          <div class=\"info__icon\" aria-hidden=\"true\">\n            <!-- calendario -->\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect>\n              <path d=\"M3 9h18\"><\u002Fpath>\n              <path d=\"M8 3v4\"><\u002Fpath>\n              <path d=\"M16 3v4\"><\u002Fpath>\n              <text x=\"12\" y=\"17\" font-size=\"7\" font-weight=\"700\" text-anchor=\"middle\" stroke=\"none\" fill=\"currentColor\" font-family=\"Poppins, sans-serif\">1<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <p class=\"info__label\">Fecha:<\u002Fp>\n          <p class=\"info__value\">\n            <strong>Sábado<br>6 de Junio<\u002Fstrong>\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"info__col\">\n          <div class=\"info__icon\" aria-hidden=\"true\">\n            <!-- reloj -->\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n              <path d=\"M12 7v5l3.5 2\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <p class=\"info__label\">Hora:<\u002Fp>\n          <p class=\"info__value\">\n            <strong>9:30<\u002Fstrong> a.m.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- TAGLINE -->\n      <p class=\"tagline\" style=\"font-size: 42px\">\n        <span class=\"line-a\">\n          <span class=\"w\">Solo<\u002Fspan> <span class=\"w\">los<\u002Fspan> <span class=\"w\">mejores<\u002Fspan>\n        <\u002Fspan>\n        <span class=\"line-b\">llegarán a la final.<\u002Fspan>\n      <\u002Fp>\n\n      <!-- CTA -->\n      <a class=\"cta\" href=\"https://forms.gle/R4N3rxEiqcj1uKai6\" id=\"ctaBtn\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 33px\">\n        <span class=\"cta__label\">Inscríbete aquí<\u002Fspan>\n        <svg class=\"cta__arrow\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n          <path d=\"M5 12h14\"><\u002Fpath>\n          <path d=\"M13 5l7 7-7 7\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fa>\n\n    <\u002Fsection>\n  <\u002Fmain>\n\n<script>\n  // Parallax sutil del fondo al mover el mouse\n  (function(){\n    const bg = document.querySelector('.bg-image');\n    if (!bg || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n\n    let targetX = 0, targetY = 0, curX = 0, curY = 0;\n    let ticking = false;\n\n    function loop(){\n      curX += (targetX - curX) * 0.06;\n      curY += (targetY - curY) * 0.06;\n      bg.style.transform = `scale(1.06) translate(${curX}px, ${curY}px)`;\n      if (Math.abs(targetX - curX) > 0.1 || Math.abs(targetY - curY) > 0.1) {\n        requestAnimationFrame(loop);\n      } else {\n        ticking = false;\n      }\n    }\n\n    window.addEventListener('mousemove', (e) => {\n      const nx = (e.clientX / window.innerWidth - 0.5) * 2;\n      const ny = (e.clientY / window.innerHeight - 0.5) * 2;\n      targetX = nx * 14;\n      targetY = ny * 10;\n      if (!ticking){ ticking = true; requestAnimationFrame(loop); }\n    }, { passive: true });\n\n    // Parallax por tilt en móvil\n    window.addEventListener('deviceorientation', (e) => {\n      if (e.gamma == null || e.beta == null) return;\n      targetX = Math.max(-1, Math.min(1, e.gamma / 30)) * 10;\n      targetY = Math.max(-1, Math.min(1, e.beta  / 45)) * 8;\n      if (!ticking){ ticking = true; requestAnimationFrame(loop); }\n    }, { passive: true });\n  })();\n\n  // Ripple dorado en el click del CTA\n  (function(){\n    const cta = document.getElementById('ctaBtn');\n    if (!cta) return;\n    cta.addEventListener('click', (e) => {\n      const rect = cta.getBoundingClientRect();\n      const r = document.createElement('span');\n      const size = Math.max(rect.width, rect.height) * 1.5;\n      r.style.cssText = `\n        position:absolute; left:${e.clientX - rect.left - size/2}px;\n        top:${e.clientY - rect.top - size/2}px;\n        width:${size}px; height:${size}px;\n        background: radial-gradient(circle, rgba(245,184,25,0.55) 0%, transparent 65%);\n        border-radius:50%; pointer-events:none;\n        transform: scale(0); opacity:1;\n        transition: transform .7s cubic-bezier(.2,.8,.2,1), opacity .8s ease-out;\n      `;\n      cta.appendChild(r);\n      requestAnimationFrame(()=> {\n        r.style.transform = 'scale(1)';\n        r.style.opacity = '0';\n      });\n      setTimeout(()=> r.remove(), 800);\n    });\n  })();\n\n  // Reveal al hacer scroll (si la landing es más larga en el futuro)\n  (function(){\n    const els = document.querySelectorAll('[data-reveal]');\n    if (!els.length || !('IntersectionObserver' in window)) return;\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(en => {\n        if (en.isIntersecting){\n          en.target.classList.add('is-visible');\n          io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.15 });\n    els.forEach(el => io.observe(el));\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
